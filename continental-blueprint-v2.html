<!DOCTYPE html>
<html lang="th">

<head>
	<meta charset="UTF-8">
	<title>The Continental — Architectural Floor Plans</title>
	<style>
		:root {
			--gold: #333333;
			--gold-dim: #666666;
			--gold-bright: #1a1a1a;
			--bg: #f4f4f2;
			--paper: #ffffff;
			--line: #333333;
			--line-soft: #aaaaaa;
			--ink: #222222;
			--ink-dim: #666666;
			--red: #8a2c2c;
			--furn: #ebebe9;
			--svc: #d8d8d6;
		}

		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			padding: 0;
			background: #e9e9e6;
			color: var(--ink);
			font-family: Arial, Helvetica, sans-serif;
			min-height: 100vh;
		}

		.wrap {
			max-width: 1280px;
			margin: 0 auto;
			padding: 28px 20px 60px;
		}

		.masthead {
			display: flex;
			justify-content: space-between;
			align-items: flex-end;
			border-bottom: 2px solid var(--gold);
			padding-bottom: 14px;
			margin-bottom: 18px;
		}

		.masthead h1 {
			margin: 0;
			font-family: 'Times New Roman', Georgia, serif;
			letter-spacing: 6px;
			font-size: 28px;
			font-weight: 400;
			color: var(--gold-bright);
			text-transform: uppercase;
		}

		.masthead .sub {
			font-size: 11px;
			letter-spacing: 3px;
			color: var(--ink-dim);
			margin-top: 4px;
			text-transform: uppercase;
		}

		.masthead .doc-id {
			text-align: right;
			font-size: 11px;
			color: var(--ink-dim);
			line-height: 1.7;
			letter-spacing: 1px;
		}

		.floor-tabs {
			display: flex;
			flex-wrap: wrap;
			gap: 6px;
			margin-bottom: 18px;
		}

		.floor-tabs button {
			background: #ffffff;
			border: 1px solid var(--line-soft);
			color: var(--ink-dim);
			font-family: inherit;
			font-size: 12px;
			letter-spacing: 1px;
			padding: 8px 12px;
			cursor: pointer;
			transition: all .15s ease;
		}

		.floor-tabs button:hover {
			border-color: var(--gold);
			color: var(--ink);
		}

		.floor-tabs button.active {
			background: var(--gold);
			color: #ffffff;
			border-color: var(--gold);
			font-weight: bold;
		}

		.sheet {
			background: var(--paper);
			border: 1px solid var(--line-soft);
			position: relative;
		}

		.sheet svg {
			display: block;
			width: 100%;
			height: auto;
		}

		.legend-bar {
			display: flex;
			flex-wrap: wrap;
			gap: 18px;
			padding: 14px 18px;
			border-top: 1px solid var(--line-soft);
			font-size: 10.5px;
			color: var(--ink-dim);
			letter-spacing: .5px;
		}

		.legend-bar span {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.legend-bar i {
			display: inline-block;
			width: 14px;
			height: 10px;
			border: 1px solid var(--gold-dim);
		}

		footer {
			text-align: center;
			margin-top: 22px;
			font-size: 10px;
			letter-spacing: 2px;
			color: #999999;
			text-transform: uppercase;
		}

		/* SVG text defaults */
		text {
			font-family: 'Arial', 'Helvetica', sans-serif;
		}
	</style>
</head>

<body>
	<div class="wrap">
		<div class="masthead">
			<div>
				<h1>The Continental</h1>
				<div class="sub">Architectural Floor Plan Survey · High Table Property Registry</div>
			</div>
			<div class="doc-id"> DWG NO. CONT‑IDLE‑000<br> SCALE 1 : 100 &nbsp; · &nbsp; SHEET <span id="sheetNo">01</span> /
				12 </div>
		</div>
		<div class="floor-tabs" id="floorTabs"></div>
		<div class="sheet">
			<svg id="svgRoot" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg"></svg>
			<div class="legend-bar" id="legendBar"></div>
		</div>
		<footer>Adjudicator copy · No business may be conducted on the premises · Continental‑Idle reference plan</footer>
	</div>
	<script>
		/* ============================================================
			 THE CONTINENTAL — fully redesigned, architecturally distinct
			 floor plans. Each floor has its own footprint logic, not a
			 repeated template. Sourced from hq-layout.ts room manifest.
			 ============================================================ */

		const NS = "http://www.w3.org/2000/svg";
		const W = 1200, H = 600;
		const OUTER = { x: 40, y: 60, w: 1120, h: 480 }; // x:40-1160, y:60-540

		const FLOOR_META = [
			{ id: 'G', name: 'Basement', tag: 'SUB-01', info: 'Black Market · Continental Vault · Underground Services · MEP · Data · Control · Loading Bay' },
			{ id: '1', name: 'Lobby', tag: 'GF', info: 'Grand Lobby · Concierge · Luggage Storage · Waiting Lounge · Reception Desk · Main Entrance' },
			{ id: '2', name: 'Restaurant & Bar', tag: 'L2', info: 'Kitchen · Bar / Lounge · Loading Bay · Food Storage · Service Corridor' },
			{ id: '3', name: 'Standard Rooms', tag: 'L3', info: '40 Standard Rooms' },
			{ id: '4', name: 'Deluxe Rooms', tag: 'L4', info: '40 Deluxe Rooms' },
			{ id: '5', name: 'Executive Rooms', tag: 'L5', info: '16 Executive Rooms' },
			{ id: '6', name: 'Presidential Suites', tag: 'L6', info: '16 Presidential Suites' },
			{ id: '7', name: 'VIP Suites', tag: 'L7', info: '8 VIP Suites · Exclusive Guests' },
			{ id: '8', name: 'Penthouse', tag: 'L8', info: '8 Penthouse Suites · Presidential Penthouse' },
			{ id: '9', name: 'Security', tag: 'L9', info: 'Control Center · Armory · Safe House · Blast Corridor' },
			{ id: '10', name: 'Intel & Management', tag: 'L10', info: 'Datacenter · Intelligence Network · Manager\'s Office · Staff Quarters' },
			{ id: '11', name: 'Rooftop', tag: 'RF', info: 'Rooftop Terrace · Helipad · Perimeter Safety Rail' },
		];

		/* ---------------- base primitives ---------------- */
		function el(tag, attrs, parent) {
			const e = document.createElementNS(NS, tag);
			for (const k in attrs) e.setAttribute(k, attrs[k]);
			if (parent) parent.appendChild(e);
			return e;
		}

		function wallRect(g, x, y, w, h) {
			el('rect', { x, y, width: w, height: h, fill: '#ffffff', stroke: 'var(--line)', 'stroke-width': 1.5 }, g);
			el('rect', { x: x + 5, y: y + 5, width: w - 10, height: h - 10, fill: 'none', stroke: 'var(--line)', 'stroke-width': .7 }, g);
		}

		function wallPoly(g, pts) {
			const d = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0] + ' ' + p[1]).join(' ') + ' Z';
			el('path', { d, fill: '#ffffff', stroke: 'var(--line)', 'stroke-width': 1.5 }, g);
			const cx = pts.reduce((s, p) => s + p[0], 0) / pts.length;
			const cy = pts.reduce((s, p) => s + p[1], 0) / pts.length;
			const inset = pts.map(p => {
				const dx = p[0] - cx, dy = p[1] - cy, len = Math.hypot(dx, dy) || 1;
				return [p[0] - dx / len * 5, p[1] - dy / len * 5];
			});
			const d2 = inset.map((p, i) => (i === 0 ? 'M' : 'L') + p[0] + ' ' + p[1]).join(' ') + ' Z';
			el('path', { d: d2, fill: 'none', stroke: 'var(--line)', 'stroke-width': .7 }, g);
		}

		function label(g, cx, cy, text, sub, size) {
			el('text', { x: cx, y: cy, 'text-anchor': 'middle', 'font-size': size || 14.5, fill: 'var(--ink)', 'letter-spacing': '1.2' }, g).textContent = text.toUpperCase();
			if (sub) {
				el('text', { x: cx, y: cy + 15, 'text-anchor': 'middle', 'font-size': 9.5, fill: 'var(--ink-dim)' }, g).textContent = sub.toUpperCase();
			}
		}

		function doorArc(g, x, y, dir, r) {
			r = r || 28;
			let d, leaf;
			if (dir === 'down') { d = `M ${x} ${y} A ${r} ${r} 0 0 1 ${x + r} ${y + r}`; leaf = `M ${x} ${y} L ${x} ${y + r}`; }
			else if (dir === 'up') { d = `M ${x} ${y} A ${r} ${r} 0 0 1 ${x - r} ${y - r}`; leaf = `M ${x} ${y} L ${x} ${y - r}`; }
			else if (dir === 'left') { d = `M ${x} ${y} A ${r} ${r} 0 0 1 ${x - r} ${y + r}`; leaf = `M ${x} ${y} L ${x - r} ${y}`; }
			else { d = `M ${x} ${y} A ${r} ${r} 0 0 1 ${x + r} ${y - r}`; leaf = `M ${x} ${y} L ${x + r} ${y}`; }
			el('path', { d: leaf, stroke: 'var(--line)', 'stroke-width': Math.max(1, r * 0.07) }, g);
		}

		// cuts a gap in a wall and draws the swing. orient 'h' = gap in a
		// horizontal wall (top/bottom edge), 'v' = gap in a vertical wall (side edge)
		// size = gap width (default 44). arc radius scales proportionally.
		function doorGap(g, cx, cy, orient, swing, size) {
			size = size || 44;
			const half = size / 2;
			const thick = Math.max(8, size * 0.3);
			const r = Math.max(8, size * 0.6);
			if (orient === 'h') {
				el('rect', { x: cx - half, y: cy - thick / 2, width: size, height: thick, fill: '#ffffff' }, g);
				doorArc(g, cx - half, cy, swing, r);
			} else {
				el('rect', { x: cx - thick / 2, y: cy - half, width: thick, height: size, fill: '#ffffff' }, g);
				doorArc(g, cx, cy - half, swing, r);
			}
		}

		function corridorBand(g, x, y, w, h, text, vertical) {
			el('rect', { x, y, width: w, height: h, fill: 'var(--furn)', stroke: 'var(--line-soft)', 'stroke-width': .7 }, g);
			if (!vertical) {
				el('line', { x1: x + 12, y1: y + h / 2, x2: x + w - 12, y2: y + h / 2, stroke: 'var(--ink-dim)', 'stroke-width': .6, 'stroke-dasharray': '9 6' }, g);
			} else {
				el('line', { x1: x + w / 2, y1: y + 12, x2: x + w / 2, y2: y + h - 12, stroke: 'var(--ink-dim)', 'stroke-width': .6, 'stroke-dasharray': '9 6' }, g);
			}
			if (text) {
				const tx = x + w / 2, ty = y + h / 2 + 3;
				const t = el('text', { x: tx, y: ty, 'text-anchor': 'middle', 'font-size': 8.5, fill: 'var(--ink-dim)', 'letter-spacing': '2' }, g);
				if (vertical) t.setAttribute('transform', `rotate(-90 ${tx} ${ty})`);
				t.textContent = text.toUpperCase();
			}
		}

		function diagCorridor(g, x1, y1, x2, y2, label_) {
			el('line', { x1, y1, x2, y2, stroke: 'var(--line-soft)', 'stroke-width': 62, 'stroke-linecap': 'round' }, g);
			el('line', { x1, y1, x2, y2, stroke: 'var(--furn)', 'stroke-width': 56, 'stroke-linecap': 'round' }, g);
			el('line', { x1, y1, x2, y2, stroke: 'var(--ink-dim)', 'stroke-width': .8, 'stroke-dasharray': '9 6' }, g);
			if (label_) {
				const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
				el('text', { x: mx, y: my - 22, 'text-anchor': 'middle', 'font-size': 8.5, fill: 'var(--ink-dim)', 'letter-spacing': '2' }, g).textContent = label_;
			}
		}

		function compassScale(g) {
			const cx = 1108, cy = 98;
			el('circle', { cx, cy, r: 28, fill: '#ffffff', stroke: 'var(--line-soft)', 'stroke-width': 1 }, g);
			el('line', { x1: cx, y1: cy - 24, x2: cx, y2: cy + 24, stroke: 'var(--line-soft)', 'stroke-width': .8 }, g);
			el('line', { x1: cx - 24, y1: cy, x2: cx + 24, y2: cy, stroke: 'var(--line-soft)', 'stroke-width': .8 }, g);
			el('path', { d: `M ${cx} ${cy - 24} L ${cx - 6} ${cy - 10} L ${cx + 6} ${cy - 10} Z`, fill: 'var(--line-soft)' }, g);
			el('text', { x: cx, y: cy - 30, 'text-anchor': 'middle', 'font-size': 9, fill: 'var(--ink-dim)' }, g).textContent = 'N';

			const sx = 60, sy = 556;
			el('line', { x1: sx, y1: sy, x2: sx + 180, y2: sy, stroke: 'var(--line-soft)', 'stroke-width': 1.2 }, g);
			for (let i = 0; i <= 4; i++) el('line', { x1: sx + i * 45, y1: sy - 4, x2: sx + i * 45, y2: sy + 4, stroke: 'var(--line-soft)', 'stroke-width': 1 }, g);
			el('text', { x: sx, y: sy + 15, 'font-size': 8.5, fill: 'var(--ink-dim)' }, g).textContent = '0';
			el('text', { x: sx + 180, y: sy + 15, 'font-size': 8.5, fill: 'var(--ink-dim)', 'text-anchor': 'end' }, g).textContent = '10 m';
		}

		function titleBlock(g, meta) {
			const x = 890, y = 512, w = 270, h = 70;
			el('rect', { x, y, width: w, height: h, fill: '#ffffff', stroke: 'var(--line)', 'stroke-width': 1.2 }, g);
			el('line', { x1: x, y1: y + 26, x2: x + w, y2: y + 26, stroke: 'var(--line-soft)', 'stroke-width': .8 }, g);
			el('text', { x: x + 10, y: y + 18, 'font-size': 12, fill: 'var(--ink)', 'letter-spacing': '1.2' }, g).textContent = `FLOOR ${meta.tag} — ${meta.name.toUpperCase()}`;
			el('text', { x: x + 10, y: y + 40, 'font-size': 9, fill: 'var(--ink-dim)' }, g).textContent = 'THE CONTINENTAL · BANGKOK BRANCH';
			el('text', { x: x + 10, y: y + 53, 'font-size': 9, fill: 'var(--ink-dim)' }, g).textContent = 'ARCHITECT REV. 2 — CONTINENTAL-IDLE';
			el('text', { x: x + 10, y: y + 65, 'font-size': 9, fill: 'var(--ink-dim)' }, g).textContent = 'SCALE 1:100 · NOT FOR CONSTRUCTION';
		}

		function frame(g) {
			const defs = el('defs', {}, g);
			const pat = el('pattern', { id: 'grid', width: 20, height: 20, patternUnits: 'userSpaceOnUse' }, defs);
			el('rect', { width: 20, height: 20, fill: '#f7f7f5' }, pat);
			el('path', { d: 'M 20 0 L 0 0 0 20', fill: 'none', stroke: '#e0e0de', 'stroke-width': .5 }, pat);
			el('rect', { x: 0, y: 0, width: W, height: H, fill: 'url(#grid)' }, g);
			el('rect', { x: 18, y: 18, width: W - 36, height: H - 36, fill: 'none', stroke: 'var(--line-soft)', 'stroke-width': .8 }, g);
			el('rect', { x: OUTER.x, y: OUTER.y, width: OUTER.w, height: OUTER.h, fill: 'none', stroke: 'var(--line)', 'stroke-width': 1.5 }, g);
		}

		/* ---------------- furniture / fixture icons ---------------- */
		const F = 'var(--ink-dim)';

		function fBed(g, x, y, w, h) {
			el('rect', { x, y, width: w, height: h, fill: 'none', stroke: F, 'stroke-width': 1 }, g);
			el('rect', { x: x + 5, y: y + 5, width: w - 10, height: h * 0.32, fill: 'none', stroke: F, 'stroke-width': 1 }, g);
			for (let i = 1; i < 4; i++) el('line', { x1: x + 5, y1: y + h * 0.32 + i * 8, x2: x + w - 5, y2: y + h * 0.32 + i * 8, stroke: F, 'stroke-width': .6 }, g);
			el('rect', { x: x + w + 4, y: y + 4, width: 14, height: 14, fill: 'none', stroke: F, 'stroke-width': .8 }, g); // nightstand
		}
		function fDesk(g, x, y, w, h) {
			el('rect', { x, y, width: w, height: h, fill: 'none', stroke: F, 'stroke-width': 1 }, g);
			el('rect', { x: x + w * 0.3, y: y + h + 4, width: w * 0.4, height: 10, fill: 'none', stroke: F, 'stroke-width': .8 }, g);
		}
		function fSofa(g, x, y, w, h, rot) {
			const t = rot ? `rotate(${rot} ${x + w / 2} ${y + h / 2})` : null;
			const r = el('rect', { x, y, width: w, height: h, rx: 8, fill: 'none', stroke: F, 'stroke-width': 1 }, g);
			if (t) r.setAttribute('transform', t);
		}
		function fTableChairs(g, cx, cy, rad) {
			el('circle', { cx, cy, r: rad, fill: 'none', stroke: F, 'stroke-width': 1 }, g);
			for (let i = 0; i < 4; i++) {
				const a = i * Math.PI / 2 + Math.PI / 4;
				el('circle', { cx: cx + (rad + 14) * Math.cos(a), cy: cy + (rad + 14) * Math.sin(a), r: 7, fill: 'none', stroke: F, 'stroke-width': .8 }, g);
			}
		}
		function fPlant(g, cx, cy, r) {
			el('circle', { cx, cy, r, fill: 'none', stroke: F, 'stroke-width': .8 }, g);
			el('circle', { cx, cy, r: r * 0.4, fill: 'none', stroke: F, 'stroke-width': .6 }, g);
			for (let i = 0; i < 6; i++) { const a = i * Math.PI / 3; el('line', { x1: cx, y1: cy, x2: cx + r * 1.3 * Math.cos(a), y2: cy + r * 1.3 * Math.sin(a), stroke: F, 'stroke-width': .6 }, g); }
		}

		/* ============================================================
			 FLOOR G — BASEMENT: individual rooms around central elevator
			 Left: Loading Bay + Sorting, Technical Core + Vault
			 Right: Black Market
			 ============================================================ */
		function drawG(g) {
			// vertical corridor — full height through center (100px)
			corridorBand(g, 550, 60, 100, 480, 'MAIN CORRIDOR', true);

			// horizontal corridor — 100px wrapping around elevator at y=250-350
			corridorBand(g, 40, 250, 510, 100, '', false);
			corridorBand(g, 650, 250, 510, 100, '', false);

			// ── LEFT ZONE: BOH rooms (flush to outer walls) ──

			// Loading Bay + Sorting — top zone (190px), door right to vertical corridor
			wallRect(g, 40, 60, 510, 190);
			label(g, 295, 130, 'LOADING BAY', 'Supply Receiving · Sorting', 9);
			doorGap(g, 550, 155, 'v', 'left', 24);

			// Technical Core — 3 rooms below horizontal corridor
			wallRect(g, 40, 350, 165, 190);
			label(g, 122, 435, 'MEP', 'Fan Room', 8);
			doorGap(g, 122, 350, 'h', 'down', 20);

			wallRect(g, 205, 350, 165, 190);
			label(g, 287, 435, 'DATA', 'Server Room', 8);
			doorGap(g, 287, 350, 'h', 'down', 20);

			wallRect(g, 370, 350, 180, 190);
			label(g, 460, 435, 'CONTROL', 'Security Ops', 8);
			doorGap(g, 460, 350, 'h', 'down', 20);

			// ── RIGHT ZONE: Black Market (flush to outer walls) ──
			wallRect(g, 650, 60, 510, 190);
			label(g, 905, 130, 'BLACK MARKET', 'Hidden Trading Floor', 11);
			for (let r = 0; r < 2; r++) {
				for (let c = 0; c < 4; c++) {
					const bx = 670 + c * 75, by = 80 + r * 80;
					el('rect', { x: bx, y: by, width: 65, height: 50, fill: 'none', stroke: F, 'stroke-width': 1 }, g);
					el('line', { x1: bx, y1: by, x2: bx + 65, y2: by + 50, stroke: F, 'stroke-width': .5 }, g);
				}
			}
			doorGap(g, 650, 155, 'v', 'right', 28);

			// Additional Black Market below corridor
			wallRect(g, 650, 350, 510, 190);
			for (let r = 0; r < 2; r++) {
				for (let c = 0; c < 4; c++) {
					const bx = 670 + c * 75, by = 370 + r * 80;
					el('rect', { x: bx, y: by, width: 65, height: 50, fill: 'none', stroke: F, 'stroke-width': 1 }, g);
					el('line', { x1: bx, y1: by, x2: bx + 65, y2: by + 50, stroke: F, 'stroke-width': .5 }, g);
				}
			}
			doorGap(g, 650, 445, 'v', 'right', 28);
		}

		/* ============================================================
			 FLOOR 1 — LOBBY: vertical arrival corridor from elevator
			 to grand lobby, pond as central visual anchor
			 ============================================================ */
		function drawF1(g) {
			// vertical lobby corridor — full height through elevator (100px wide)
			corridorBand(g, 550, 60, 100, 480, 'LOBBY', true);

			// horizontal corridor — 100px wrapping around elevator at y=250-350
			corridorBand(g, 40, 250, 510, 100, '', false);
			corridorBand(g, 650, 250, 510, 100, '', false);

			// concierge + luggage storage — left zone (190px), door right to vertical corridor
			wallRect(g, 40, 60, 510, 190);
			label(g, 295, 130, 'CONCIERGE', 'Guest Services · Luggage Storage', 11);
			doorGap(g, 550, 155, 'v', 'left', 24);

			// waiting lounge — right, door left to vertical corridor
			wallRect(g, 650, 60, 510, 190);
			label(g, 905, 130, 'WAITING LOUNGE', 'Seating Area', 11);
			doorGap(g, 650, 155, 'v', 'right', 24);

			// Grand Lobby — 100px corridor at y=250-350, full width
			corridorBand(g, 40, 250, 1120, 100, 'GRAND LOBBY', false);

			// curved reception counter — below lobby
			el('path', { d: 'M 350 460 Q 600 510 850 460', fill: 'none', stroke: F, 'stroke-width': 2 }, g);
			el('path', { d: 'M 370 448 Q 600 495 830 448', fill: 'none', stroke: F, 'stroke-width': 1 }, g);
			label(g, 600, 500, 'RECEPTION DESK', '');

			// main entrance — canopy, bottom center
			el('path', { d: 'M 420 540 L 490 490 L 710 490 L 780 540', fill: 'none', stroke: F, 'stroke-width': 1.5 }, g);
			el('line', { x1: 460, y1: 540, x2: 460, y2: 490, stroke: F, 'stroke-width': .5, 'stroke-dasharray': '4 4' }, g);
			el('line', { x1: 740, y1: 540, x2: 740, y2: 490, stroke: F, 'stroke-width': .5, 'stroke-dasharray': '4 4' }, g);
			label(g, 600, 565, 'MAIN ENTRANCE', '', 10);
		}

		/* ============================================================
			 FLOOR 2 — RESTAURANT & BAR: individual rooms around central elevator
			 Left: BOH (Loading Bay + Food Storage, Kitchen)
			 Right: Bar/Lounge (guest area)
			 ============================================================ */
		function drawF2(g) {

		function drawGuestFloor(g, opt) {

			corridorBand(g, OUTER.x + 10, cY, OUTER.w - 20, cH, opt.corrLabel || 'CORRIDOR', false);

		/* drawRoomGrid — 4-quadrant layout around central circular elevator.
			 Vertical corridor (100px) runs full height through center.
			 Circular elevator (r=42) at (600,300) divides top/bottom zones.
			 bands=1: single row per zone, doors face vertical corridor.
			 bands=2: two rows per zone + horizontal corridor, doors face horizontal corridor. */
		function drawRoomGrid(g, opt) {
			const cols = opt.cols, bands = opt.bands;
			const gap = opt.gap || 2;
			const cH = 50, vCW = 100;
			const x0 = OUTER.x, totalW = OUTER.w;
			const midX = x0 + totalW / 2;
			const leftW = (totalW - vCW) / 2;
			const rightX = midX + vCW / 2;
			const leftCols = Math.ceil(cols / 2);
			const rightCols = Math.floor(cols / 2);
			let num = opt.startNum;
			const fs = opt.fontSize || 7.5;
			const maxRooms = opt.maxRooms || cols * bands * 2;
			const prefix = opt.prefix || '';

			// auto-calculate room width (flush to outer walls)
			const rw = Math.floor((leftW - (leftCols - 1) * gap) / leftCols);
			const doorSz = Math.min(Math.max(rw * 0.3, 12), 36);

			// elevator zone — circular elevator at (600,300), r=42
			const elevR = 42, elevCY = 300;
			const zoneTop = OUTER.y;                          // 60
			const zoneBot = OUTER.y + OUTER.h;                // 540
			const elevTop = elevCY - elevR - 8;               // 250
			const elevBot = elevCY + elevR + 8;               // 350
			const topZoneH = elevTop - zoneTop;               // 190
			const botZoneH = zoneBot - elevBot;               // 190

			// vertical corridor — full height through center
			corridorBand(g, midX - vCW / 2, zoneTop, vCW, zoneBot - zoneTop, opt.corrLabel || 'LOBBY', true);

			// draw rooms in a zone (top or bottom)
			function drawZone(zoneY, zoneH) {
				if (bands === 1) {
					// single row — doors face vertical corridor
					const rh = zoneH;
					// left rooms — door on right wall
					for (let c = 0; c < leftCols; c++) {
						if (num >= opt.startNum + maxRooms) break;
						const rx = x0 + c * (rw + gap);
						wallRect(g, rx, zoneY, rw, rh);
						el('text', { x: rx + rw / 2, y: zoneY + rh / 2 + 3, 'text-anchor': 'middle', 'font-size': fs, fill: 'var(--ink-dim)' }, g).textContent = prefix + num;
						doorGap(g, rx + rw, zoneY + rh / 2, 'v', 'right', doorSz);
						num++;
					}
					// right rooms — door on left wall
					for (let c = 0; c < rightCols; c++) {
						if (num >= opt.startNum + maxRooms) break;
						const rx = rightX + c * (rw + gap);
						wallRect(g, rx, zoneY, rw, rh);
						el('text', { x: rx + rw / 2, y: zoneY + rh / 2 + 3, 'text-anchor': 'middle', 'font-size': fs, fill: 'var(--ink-dim)' }, g).textContent = prefix + num;
						doorGap(g, rx, zoneY + rh / 2, 'v', 'left', doorSz);
						num++;
					}
				} else {
					// multiple rows — horizontal corridor between rows
					const rh = Math.floor((zoneH - cH - 2 * gap) / 2);
					const topY = zoneY;
					const corrY = zoneY + rh + gap;
					const botY = corrY + cH + gap;
					const rhBot = zoneY + zoneH - botY;

					// horizontal corridors (left + right of vertical corridor)
					corridorBand(g, x0, corrY, leftW, cH, '', false);
					corridorBand(g, rightX, corrY, leftW, cH, '', false);

					// top row — doors face down to horizontal corridor
					for (let c = 0; c < leftCols; c++) {
						if (num >= opt.startNum + maxRooms) break;
						const rx = x0 + c * (rw + gap);
						wallRect(g, rx, topY, rw, rh);
						el('text', { x: rx + rw / 2, y: topY + rh / 2 + 3, 'text-anchor': 'middle', 'font-size': fs, fill: 'var(--ink-dim)' }, g).textContent = prefix + num;
						doorGap(g, rx + rw / 2, topY + rh, 'h', 'down', doorSz);
						num++;
					}
					for (let c = 0; c < rightCols; c++) {
						if (num >= opt.startNum + maxRooms) break;
						const rx = rightX + c * (rw + gap);
						wallRect(g, rx, topY, rw, rh);
						el('text', { x: rx + rw / 2, y: topY + rh / 2 + 3, 'text-anchor': 'middle', 'font-size': fs, fill: 'var(--ink-dim)' }, g).textContent = prefix + num;
						doorGap(g, rx + rw / 2, topY + rh, 'h', 'down', doorSz);
						num++;
					}
					// bottom row — doors face up to horizontal corridor
					for (let c = 0; c < leftCols; c++) {
						if (num >= opt.startNum + maxRooms) break;
						const rx = x0 + c * (rw + gap);
						wallRect(g, rx, botY, rw, rhBot);
						el('text', { x: rx + rw / 2, y: botY + rhBot / 2 + 3, 'text-anchor': 'middle', 'font-size': fs, fill: 'var(--ink-dim)' }, g).textContent = prefix + num;
						doorGap(g, rx + rw / 2, botY, 'h', 'up', doorSz);
						num++;
					}
					for (let c = 0; c < rightCols; c++) {
						if (num >= opt.startNum + maxRooms) break;
						const rx = rightX + c * (rw + gap);
						wallRect(g, rx, botY, rw, rhBot);
						el('text', { x: rx + rw / 2, y: botY + rhBot / 2 + 3, 'text-anchor': 'middle', 'font-size': fs, fill: 'var(--ink-dim)' }, g).textContent = prefix + num;
						doorGap(g, rx + rw / 2, botY, 'h', 'up', doorSz);
						num++;
					}
				}
			}

			drawZone(zoneTop, topZoneH);
			drawZone(elevBot, botZoneH);
		}

		/* Circular glass elevator — 4 compartments, centered at building core */
		function circularElevator(g) {
			const cx = 600, cy = 300, r = 42;
			// white mask to hide corridor behind
			el('circle', { cx, cy, r: r + 6, fill: '#ffffff', stroke: 'none' }, g);
			// outer ring
			el('circle', { cx, cy, r, fill: 'var(--furn)', stroke: 'var(--line)', 'stroke-width': 1.5 }, g);
			// inner ring (glass effect)
			el('circle', { cx, cy, r: r - 6, fill: 'none', stroke: 'var(--line)', 'stroke-width': .7 }, g);
			// cross dividers — 4 compartments
			el('line', { x1: cx - r, y1: cy, x2: cx + r, y2: cy, stroke: 'var(--line)', 'stroke-width': 1 }, g);
			el('line', { x1: cx, y1: cy - r, x2: cx, y2: cy + r, stroke: 'var(--line)', 'stroke-width': 1 }, g);
			// arrow indicators (up in top quadrants, down in bottom)
			for (let i = 0; i < 4; i++) {
				const a = i * Math.PI / 2 + Math.PI / 4;
				const ax = cx + (r - 16) * Math.cos(a);
				const ay = cy + (r - 16) * Math.sin(a);
				if (i < 2) {
					el('path', { d: `M ${ax - 4} ${ay + 3} L ${ax} ${ay - 3} L ${ax + 4} ${ay + 3}`, fill: 'none', stroke: 'var(--line)', 'stroke-width': 1 }, g);
				} else {
					el('path', { d: `M ${ax - 4} ${ay - 3} L ${ax} ${ay + 3} L ${ax + 4} ${ay - 3}`, fill: 'none', stroke: 'var(--line)', 'stroke-width': 1 }, g);
				}
			}
			el('text', { x: cx, y: cy + r + 12, 'text-anchor': 'middle', 'font-size': 7, fill: 'var(--ink)', 'letter-spacing': '1' }, g).textContent = 'GLASS ELEVATOR';
		}

		const ELEVATOR_COUNT = { G: 1, '1': 2, '2': 2, '3': 2, '4': 2, '5': 2, '6': 2, '7': 2, '8': 2, '9': 2, '10': 2, '11': 1 };
		const FLOOR_DRAWERS = { G: drawG, '1': drawF1, '2': drawF2, '3': drawF3, '4': drawF4, '5': drawF5, '6': drawF6, '7': drawF7, '8': drawF8, '9': drawF9, '10': drawF10, '11': drawF11 };

		/* ============================================================
			 RENDER
			 ============================================================ */
		const svg = document.getElementById('svgRoot');
		const tabsEl = document.getElementById('floorTabs');
		const legendEl = document.getElementById('legendBar');
		const sheetNoEl = document.getElementById('sheetNo');

		function render(floorId) {
			const meta = FLOOR_META.find(f => f.id === floorId);
			svg.innerHTML = '';
			const g = el('g', {}, svg);

			frame(g);
			FLOOR_DRAWERS[floorId](g);
			circularElevator(g);

			legendEl.innerHTML = '';
			const infoSpan = document.createElement('span');
			infoSpan.style.cssText = 'font-weight:bold;color:var(--ink);letter-spacing:.5px;flex-basis:100%;margin-bottom:4px;';
			infoSpan.textContent = `${meta.tag} · ${meta.name.toUpperCase()} — ${meta.info}`;
			legendEl.appendChild(infoSpan);
			[
				['Load-bearing wall', 'var(--line)'],
				['Corridor / circulation', 'var(--line-soft)'],
				['Door swing', 'var(--ink-dim)'],
				['Outdoor / open-air', 'var(--ink-dim)'],
			].forEach(([t, c]) => {
				const span = document.createElement('span');
				span.innerHTML = `<i style="border-color:${c}"></i>${t}`;
				legendEl.appendChild(span);
			});

			sheetNoEl.textContent = meta.tag;
			[...tabsEl.children].forEach(b => b.classList.toggle('active', b.dataset.id === floorId));
		}

		FLOOR_META.forEach(f => {
			const b = document.createElement('button');
			b.textContent = `${f.tag} · ${f.name}`;
			b.dataset.id = f.id;
			b.onclick = () => render(f.id);
			tabsEl.appendChild(b);
		});

		render('1');
	</script>
</body>

</html>
