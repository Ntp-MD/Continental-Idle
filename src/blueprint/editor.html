<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Blueprint Editor — Continental Idle</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html,
		body {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #08090c;
		}

		::-webkit-scrollbar {
			width: 8px;
			height: 8px;
		}

		::-webkit-scrollbar-track {
			background: #0c0d10;
		}

		::-webkit-scrollbar-thumb {
			background: #2a2c36;
			border-radius: 4px;
		}

		::-webkit-scrollbar-thumb:hover {
			background: #3a3c48;
		}

		::-webkit-scrollbar-corner {
			background: #0c0d10;
		}

		* {
			scrollbar-width: thin;
			scrollbar-color: #2a2c36 #0c0d10;
		}
	</style>
</head>

<body>
	<div id="editor-app"></div>
	<script type="module" src="/src/blueprint/editor-main.ts"></script>
</body>

</html>
